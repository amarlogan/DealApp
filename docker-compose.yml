services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time args: baked into the Next.js static bundle
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
        - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
    container_name: huntmydeal-web
    restart: always
    extra_hosts:
      # Allows the container to reach self-hosted Supabase on this same VPS.
      # Without this, srv1603188.hstgr.cloud resolves to 127.0.1.1 (loopback)
      # inside Docker, which causes ECONNREFUSED.
      - "srv1603188.hstgr.cloud:host-gateway"
    environment:
      # Runtime env: available to the Node.js server process
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
    networks:
      - webproxy
      - supabase_default

  smtp:
    image: axllent/mailpit
    container_name: huntmydeal-smtp
    restart: always
    ports:
      - "25:25"
      - "8025:8025"
    networks:
      supabase_default:
        aliases:
          - supabase-mail
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
      - MP_SMTP_BIND_ADDR=0.0.0.0:25


networks:
  webproxy:
    external: true
  supabase_default:
    external: true
